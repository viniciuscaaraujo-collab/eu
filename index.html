    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {

      --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.18);
      --radius: 8px; --radius-lg: 12px;
      --green-bg:#EAF3DE;--green-t:#3B6D11;
      --amber-bg:#FAEEDA;--amber-t:#854F0B;
      --red-bg:#FCEBEB;--red-t:#A32D2D;
    }
    @media(prefers-color-scheme:dark){
      :root{--bg:#1a1a1a;--surface:#242424;--surface2:#2e2e2e;--text:#f0f0f0;--text2:#aaa;--text3:#555;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.18);--green-bg:#1c2e10;--green-t:#a8d97f;--amber-bg:#2e2010;--amber-t:#f0b95a;--red-bg:#2e1010;--red-t:#f08080;}
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }
    .topbar { background: var(--yellow); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar h1 { font-size: 16px; font-weight: 600; color: #1a1a1a; }
    .logo { background: #1a1a1a; color: var(--yellow); font-weight: 700; font-size: 13px; padding: 4px 10px; border-radius: 6px; }
    .facility-tag { background: rgba(0,0,0,0.12); color: #1a1a1a; font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 999px; }
    .topbar-date { font-size: 12px; color: #555; }
    .container { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }
    .filters { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 18px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 18px; }
    .filter-label { font-size: 13px; color: var(--text2); font-weight: 500; white-space: nowrap; }
    .filters select, .filters input[type=date] { font-size: 13px; padding: 6px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--surface2); color: var(--text); outline: none; }
    .btn-ok { background: var(--yellow); color: #1a1a1a; border: none; padding: 7px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-ok:hover { opacity: 0.85; }
    .btn-cl { background: transparent; color: var(--text2); border: 0.5px solid var(--border2); padding: 7px 12px; border-radius: var(--radius); font-size: 13px; cursor: pointer; }
    .btn-cl:hover { background: var(--surface2); }
    .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 18px; }
    .kpi { background: var(--surface2); border-radius: var(--radius); padding: 14px 16px; }
    .kpi-l { font-size: 12px; color: var(--text2); margin-bottom: 5px; }
    .kpi-v { font-size: 26px; font-weight: 600; color: var(--text); line-height: 1; margin-bottom: 5px; }
    .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
    .b-up { background: var(--green-bg); color: var(--green-t); }
    .b-dn { background: var(--red-bg); color: var(--red-t); }
    .b-am { background: var(--amber-bg); color: var(--amber-t); }
    .row2 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media(max-width:640px){ .row2 { grid-template-columns: 1fr; } }
    .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; }
    .card-t { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 12px; }
    .leg { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px; }
    .leg-item { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--text2); }
    .leg-dot { width:10px; height:10px; border-radius:2px; display:inline-block; }
    .table-wrap { overflow-x: auto; margin-top: 4px; }
    table.dtbl { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.dtbl th { text-align: left; font-weight: 500; color: var(--text2); padding: 7px 10px; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
    table.dtbl td { padding: 7px 10px; border-bottom: 0.5px solid var(--border); color: var(--text); }
    table.dtbl tr:last-child td { border-bottom: none; }
    table.dtbl tr:hover td { background: var(--surface2); }
    .pill { display:inline-block; font-size:11px; padding:2px 9px; border-radius:999px; font-weight:500; }
    .p-ok  { background:var(--green-bg); color:var(--green-t); }
    .p-mid { background:var(--amber-bg); color:var(--amber-t); }
    .p-low { background:var(--red-bg);   color:var(--red-t);   }
    .prog-wrap { background:var(--surface2); border-radius:999px; height:6px; width:70px; overflow:hidden; display:inline-block; vertical-align:middle; }
    .prog-bar  { height:6px; border-radius:999px; background:var(--yellow); }
    footer { text-align:center; font-size:12px; color:var(--text3); padding:20px 0 14px; }
    code { font-family:monospace; font-size:12px; }
  </style>
</head>

  const ini=document.getElementById('f-ini').value, fim=document.getElementById('f-fim').value;
  const mes=document.getElementById('f-mes').value, pf=document.getElementById('f-perf').value;
  return DADOS.filter(d=>(!ini||d.data>=ini)&&(!fim||d.data<=fim)&&(!mes||d.data.startsWith(mes))&&(!pf||perf(d.pct)===pf));
}
function renderKPIs(d){
  const n=d.length, med=n?+(d.reduce((s,x)=>s+x.pct,0)/n).toFixed(1):0;
  const max=n?Math.max(...d.map(x=>x.pct)):0, min=n?Math.min(...d.map(x=>x.pct)):0;
  const alto=d.filter(x=>x.pct>=50).length, pAlt=n?Math.round(alto/n*100):0;
  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><div class="kpi-l">Dias analisados</div><div class="kpi-v">${n}</div><div class="kpi-l">no período</div></div>
    <div class="kpi"><div class="kpi-l">Média de auditoria</div><div class="kpi-v">${med}%</div><span class="badge ${med>=40?'b-up':'b-dn'}">${med>=40?'▲ Acima de 40%':'▼ Abaixo de 40%'}</span></div>
    <div class="kpi"><div class="kpi-l">Máximo registrado</div><div class="kpi-v">${max}%</div><span class="badge b-up">melhor dia</span></div>
    <div class="kpi"><div class="kpi-l">Mínimo registrado</div><div class="kpi-v">${min}%</div><span class="badge ${min>0?'b-am':'b-dn'}">${min>0?'acima de zero':'zero'}</span></div>
    <div class="kpi"><div class="kpi-l">Dias com ≥50%</div><div class="kpi-v">${alto}</div><div class="kpi-l">${pAlt}% dos dias</div></div>`;
}
function renderLinha(d){
  if(cL)cL.destroy();
  cL=new Chart(document.getElementById('cLinha'),{type:'line',data:{labels:d.map(x=>x.data.slice(5)),datasets:[{label:'% Auditoria',data:d.map(x=>x.pct),borderColor:'#D4A017',backgroundColor:'rgba(255,230,0,0.12)',tension:0.3,fill:true,pointRadius:2.5,pointBackgroundColor:d.map(x=>x.pct>=50?'#3B6D11':x.pct>=20?'#D4A017':'#A32D2D'),pointBorderColor:'transparent',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:11}},grid:{color:'rgba(128,128,128,0.08)'}},x:{ticks:{font:{size:10},maxRotation:45,autoSkip:true,maxTicksLimit:20}}}}});
}
function renderPizza(d){
  if(cP)cP.destroy();
  const alto=d.filter(x=>x.pct>=50).length, medio=d.filter(x=>x.pct>=20&&x.pct<50).length, baixo=d.filter(x=>x.pct<20).length;
  const cores=['#3B6D11','#D4A017','#A32D2D'];
  document.getElementById('leg-pizza').innerHTML=[['Alto ≥50%',alto],['Médio 20–49%',medio],['Baixo <20%',baixo]].map(([l,v],i)=>`<span class="leg-item"><span class="leg-dot" style="background:${cores[i]}"></span>${l} (${v})</span>`).join('');
  cP=new Chart(document.getElementById('cPizza'),{type:'doughnut',data:{labels:['Alto','Médio','Baixo'],datasets:[{data:[alto,medio,baixo],backgroundColor:cores,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
}
function renderBarra(d){
  if(cB)cB.destroy();
  const meses={}, nomeMes={'2026-01':'Jan','2026-02':'Fev','2026-03':'Mar','2026-04':'Abr','2026-05':'Mai','2026-06':'Jun'};
  d.forEach(x=>{const m=x.data.slice(0,7);if(!meses[m])meses[m]={soma:0,n:0};meses[m].soma+=x.pct;meses[m].n++;});
  const sorted=Object.entries(meses).sort((a,b)=>a[0].localeCompare(b[0]));
  const labels=sorted.map(([k])=>nomeMes[k]||k), vals=sorted.map(([,v])=>+(v.soma/v.n).toFixed(1));
  cB=new Chart(document.getElementById('cBarra'),{type:'bar',data:{labels,datasets:[{label:'Média %',data:vals,backgroundColor:vals.map(v=>v>=50?'#3B6D11':v>=20?'#FFE600':'#E24B4A'),borderRadius:5,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:11}},grid:{color:'rgba(128,128,128,0.08)'}},x:{ticks:{font:{size:12}}}}}});
}
function renderTabela(d){
  const rows=d.slice().sort((a,b)=>b.data.localeCompare(a.data)).slice(0,20);
  const pc=p=>p>=50?'p-ok':p>=20?'p-mid':'p-low', pl=p=>p>=50?'Alto':p>=20?'Médio':'Baixo';
  document.getElementById('tbody').innerHTML=rows.map(x=>`<tr><td>${x.data.split('-').reverse().join('/')}</td><td><code>${x.site}</code></td><td><code>${x.facility}</code></td><td><span style="font-weight:600;margin-right:8px;">${x.pct}%</span><span class="prog-wrap"><span class="prog-bar" style="width:${x.pct}%"></span></span></td><td><span class="pill ${pc(x.pct)}">${pl(x.pct)}</span></td></tr>`).join('');
}
function renderAll(){
  const mes=document.getElementById('f-mes').value;
  if(mes){const[ano,m]=mes.split('-');const ultimo=new Date(+ano,+m,0).getDate();document.getElementById('f-ini').value=`${mes}-01`;document.getElementById('f-fim').value=`${mes}-${String(ultimo).padStart(2,'0')}`;}
  const d=filtrar();
  renderKPIs(d);renderLinha(d);renderPizza(d);renderBarra(d);renderTabela(d);
}
function limpar(){
  document.getElementById('f-ini').value='2026-01-02';document.getElementById('f-fim').value='2026-06-14';
  document.getElementById('f-mes').value='';document.getElementById('f-perf').value='';renderAll();
}
renderAll();
</script>
</body>
</html>
